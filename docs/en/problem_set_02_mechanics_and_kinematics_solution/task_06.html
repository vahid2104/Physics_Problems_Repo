<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycloid Animation</title>
  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    canvas {
      background: white;
      border: 1px solid #ccc;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Cycloid Animation</h2>
  <canvas id="canvas" width="1000" height="500"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const R = 50;              // radius
    const omega = 1;           // angular speed
    const groundY = 350;       // x-axis position on screen
    const scale = 1;           // scale factor
    let t = 0;

    const trace = [];

    function cycloidX(t) {
      return R * (omega * t - Math.sin(omega * t));
    }

    function cycloidY(t) {
      return R * (1 - Math.cos(omega * t));
    }

    function vx(t) {
      return R * omega * (1 - Math.cos(omega * t));
    }

    function vy(t) {
      return R * omega * Math.sin(omega * t);
    }

    function ax(t) {
      return R * omega * omega * Math.sin(omega * t);
    }

    function ay(t) {
      return R * omega * omega * Math.cos(omega * t);
    }

    function drawArrow(x1, y1, x2, y2, color) {
      const headlen = 10;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const angle = Math.atan2(dy, dx);

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(
        x2 - headlen * Math.cos(angle - Math.PI / 6),
        y2 - headlen * Math.sin(angle - Math.PI / 6)
      );
      ctx.lineTo(
        x2 - headlen * Math.cos(angle + Math.PI / 6),
        y2 - headlen * Math.sin(angle + Math.PI / 6)
      );
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw ground
      ctx.strokeStyle = "black";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();

      // Circle center
      const cx = 100 + R * omega * t;
      const cy = groundY - R;

      // Point on rim
      const px = 100 + cycloidX(t);
      const py = groundY - cycloidY(t);

      // Add point to trace
      trace.push({ x: px, y: py });

      // Draw cycloid trace
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < trace.length; i++) {
        if (i === 0) ctx.moveTo(trace[i].x, trace[i].y);
        else ctx.lineTo(trace[i].x, trace[i].y);
      }
      ctx.stroke();

      // Draw circle
      ctx.strokeStyle = "black";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, 2 * Math.PI);
      ctx.stroke();

      // Draw radius to point
      ctx.strokeStyle = "gray";
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(px, py);
      ctx.stroke();

      // Draw center
      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
      ctx.fill();

      // Draw point on rim
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, 2 * Math.PI);
      ctx.fill();

      // Velocity vector
      const vScale = 1.2;
      drawArrow(
        px, py,
        px + vx(t) * vScale,
        py - vy(t) * vScale,
        "green"
      );

      // Acceleration vector
      const aScale = 0.8;
      drawArrow(
        px, py,
        px + ax(t) * aScale,
        py - ay(t) * aScale,
        "orange"
      );

      // Labels
      ctx.fillStyle = "green";
      ctx.fillText("v", px + vx(t) * vScale + 5, py - vy(t) * vScale);

      ctx.fillStyle = "orange";
      ctx.fillText("a", px + ax(t) * aScale + 5, py - ay(t) * aScale);

      t += 0.03;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
